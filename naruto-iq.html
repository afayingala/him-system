<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0b0d;}
    @keyframes auroraDrift{0%{transform:translate(-5%,-3%) scale(1.1)}50%{transform:translate(5%,4%) scale(1.25)}100%{transform:translate(-5%,-3%) scale(1.1)}}@keyframes sweepDown{0%{transform:translateY(-120%)}100%{transform:translateY(2200px)}}
    @keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,3px)}40%{transform:translate(6px,-3px)}60%{transform:translate(-5px,-2px)}80%{transform:translate(5px,2px)}}
    @keyframes spinChakra{to{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes boomRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
    @keyframes floatUp{0%{opacity:0;transform:translate(-50%,0) scale(.7)}18%{opacity:1;transform:translate(-50%,-8px) scale(1.15)}100%{opacity:0;transform:translate(-50%,-40px) scale(.95)}}
    @keyframes announceIn{0%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}28%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
    @keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes spark{to{transform:translate(var(--tx),var(--ty)) scale(.3);opacity:0}}
  </style>
</helmet>
<div ref="{{ rootRef }}" style="min-height:100vh;background:radial-gradient(1000px 600px at 80% -10%, rgba(232,121,46,0.12), transparent 60%),#0a0b0d;color:#e7e6e3;font-family:'Space Grotesk',sans-serif;padding:22px 26px 30px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:-15%;z-index:0;filter:blur(80px);opacity:0.5;background:radial-gradient(34% 34% at 78% 6%, #e8792e80, transparent 70%),radial-gradient(30% 30% at 10% 92%, #56c8d644, transparent 70%);animation:auroraDrift 30s ease-in-out infinite;"></div><canvas ref="{{ dustRef }}" style="position:absolute;inset:0;z-index:1;width:100%;height:100%;pointer-events:none;"></canvas><div style="position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:46px 46px;"></div><div style="position:absolute;left:0;right:0;top:0;height:150px;z-index:1;pointer-events:none;background:linear-gradient(180deg,#e8792e12,transparent);animation:sweepDown 9s linear infinite;"></div><div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(130% 100% at 50% 40%, transparent 55%, rgba(10,11,13,0.72) 100%);"></div><div style="position:fixed;top:16px;left:16px;width:18px;height:18px;border-left:2px solid #e8792e66;border-top:2px solid #e8792e66;z-index:4;pointer-events:none;"></div><div style="position:fixed;top:16px;right:16px;width:18px;height:18px;border-right:2px solid #e8792e66;border-top:2px solid #e8792e66;z-index:4;pointer-events:none;"></div><div style="position:fixed;bottom:16px;left:16px;width:18px;height:18px;border-left:2px solid #e8792e66;border-bottom:2px solid #e8792e66;z-index:4;pointer-events:none;"></div><div style="position:fixed;bottom:16px;right:16px;width:18px;height:18px;border-right:2px solid #e8792e66;border-bottom:2px solid #e8792e66;z-index:4;pointer-events:none;"></div>

  <header style="position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.07);max-width:700px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="games.html" style="text-decoration:none;color:#9b9da2;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;border:1px solid rgba(255,255,255,0.12);padding:8px 12px;border-radius:9px;">← ARCADE</a>
      <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;">NARUTO IQ</div>
    </div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:#e8792e;">BEST · {{ best }}</div>
  </header>

  <main style="position:relative;z-index:5;max-width:700px;margin:0 auto;padding-top:14px;">

    <!-- HP BARS -->
    <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
          <span style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;color:#e8792e;">YOU</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:#7b7d82;">CHAKRA</span>
        </div>
        <div style="height:16px;border:2px solid rgba(255,255,255,0.18);border-radius:5px;background:rgba(0,0,0,0.5);overflow:hidden;display:flex;justify-content:flex-end;">
          <div style="height:100%;width:{{ youHpPct }};background:{{ youHpColor }};transition:width .3s ease;box-shadow:0 0 12px {{ youHpColor }};"></div>
        </div>
      </div>
      <div style="text-align:center;min-width:64px;padding-top:2px;">
        <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#7b7d82;">Q {{ qNum }}/10</div>
        <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px;color:{{ streakColor }};">×{{ mult }}</div>
        <div style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:#7b7d82;">{{ streak }} STREAK</div>
      </div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:#7b7d82;">CHAKRA</span>
          <span style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;color:#8b7ef0;">RIVAL</span>
        </div>
        <div style="height:16px;border:2px solid rgba(255,255,255,0.18);border-radius:5px;background:rgba(0,0,0,0.5);overflow:hidden;">
          <div style="height:100%;width:{{ foeHpPct }};background:{{ foeHpColor }};transition:width .3s ease;box-shadow:0 0 12px {{ foeHpColor }};"></div>
        </div>
      </div>
    </div>

    <!-- BATTLE STAGE -->
    <div style="position:relative;width:100%;height:172px;border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);background:linear-gradient(180deg,#1a1208 0%,#241a0e 40%,#2a1d10 70%,#160f07 100%);box-shadow:inset 0 0 60px rgba(0,0,0,0.6);margin-bottom:14px;">
      <div style="position:absolute;left:0;right:0;bottom:0;height:42px;background:linear-gradient(180deg,#3a2a14,#0f0a05);border-top:2px solid rgba(232,121,46,0.2);pointer-events:none;"></div>
      <!-- YOU ninja -->
      <div style="{{ youWrap }}">
        <div style="position:relative;width:42px;height:62px;">
          <div style="position:absolute;bottom:0;left:9px;width:9px;height:24px;background:#16404a;border-radius:5px;transform:rotate(-10deg);"></div>
          <div style="position:absolute;bottom:0;left:24px;width:9px;height:24px;background:#16404a;border-radius:5px;transform:rotate(10deg);"></div>
          <div style="position:absolute;bottom:18px;left:9px;width:24px;height:30px;background:linear-gradient(180deg,#e8792e,#a8541c);border-radius:8px;border:1px solid #ffb56b;"></div>
          <div style="position:absolute;bottom:42px;left:11px;width:20px;height:19px;border-radius:50%;background:radial-gradient(circle at 60% 40%,#f0d2a8,#c89a6a);"></div>
          <div style="position:absolute;bottom:55px;left:9px;width:24px;height:6px;background:#1d5560;border-radius:3px;"></div>
          <div style="position:absolute;bottom:57px;left:15px;width:6px;height:6px;border-radius:50%;background:#cfd0d2;box-shadow:0 0 4px #56c8d6;"></div>
        </div>
      </div>
      <!-- RIVAL ninja -->
      <div style="{{ foeWrap }}">
        <div style="position:relative;width:42px;height:62px;transform:scaleX(-1);">
          <div style="position:absolute;bottom:0;left:9px;width:9px;height:24px;background:#3a2d5a;border-radius:5px;transform:rotate(-10deg);"></div>
          <div style="position:absolute;bottom:0;left:24px;width:9px;height:24px;background:#3a2d5a;border-radius:5px;transform:rotate(10deg);"></div>
          <div style="position:absolute;bottom:18px;left:9px;width:24px;height:30px;background:linear-gradient(180deg,#8b7ef0,#5a4db0);border-radius:8px;border:1px solid #b9aef7;"></div>
          <div style="position:absolute;bottom:42px;left:11px;width:20px;height:19px;border-radius:50%;background:radial-gradient(circle at 60% 40%,#e8d2f0,#a888c8);"></div>
          <div style="position:absolute;bottom:55px;left:9px;width:24px;height:6px;background:#2a1d40;border-radius:3px;"></div>
          <div style="position:absolute;bottom:57px;left:15px;width:6px;height:6px;border-radius:50%;background:#d44a6a;box-shadow:0 0 5px #d44a6a;"></div>
        </div>
      </div>
      <!-- jutsu orb -->
      <sc-if value="{{ showOrb }}" hint-placeholder-val="{{ false }}">
        <div style="{{ orbStyle }}"></div>
      </sc-if>
      <sc-for list="{{ booms }}" as="b" hint-placeholder-count="0"><div style="{{ b.style }}"></div></sc-for>
      <sc-for list="{{ parts }}" as="p" hint-placeholder-count="0"><div style="{{ p.style }}"></div></sc-for>
      <sc-for list="{{ floaters }}" as="f" hint-placeholder-count="0"><div style="{{ f.style }}">{{ f.text }}</div></sc-for>
      <sc-if value="{{ showAnnounce }}" hint-placeholder-val="{{ false }}">
        <div key="{{ announceKey }}" style="position:absolute;left:50%;top:42%;z-index:16;text-align:center;pointer-events:none;animation:announceIn 1.1s ease-out forwards;">
          <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:{{ announceSize }};letter-spacing:1px;color:{{ announceColor }};text-shadow:0 0 26px {{ announceColor }},0 3px 8px rgba(0,0,0,0.8);">{{ announceText }}</div>
        </div>
      </sc-if>
    </div>

    <!-- QUIZ -->
    <sc-if value="{{ playing }}" hint-placeholder-val="{{ true }}">
      <!-- chakra timer -->
      <div style="height:7px;border-radius:6px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:18px;">
        <div style="height:100%;width:{{ timerPct }};background:{{ timerColor }};border-radius:6px;transition:width .1s linear;box-shadow:0 0 10px {{ timerColor }};"></div>
      </div>
      <div key="{{ qKey }}" style="animation:riseIn .35s ease both;">
        <h2 style="font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:23px;line-height:1.25;margin-bottom:18px;text-align:center;">{{ question }}</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">
          <sc-for list="{{ options }}" as="o" hint-placeholder-count="4">
            <button onClick="{{ o.onPick }}" disabled="{{ o.locked }}" style="{{ o.style }}">
              <span style="font-family:'Space Mono',monospace;font-size:11px;color:#7b7d82;margin-right:10px;">{{ o.key }}</span>{{ o.text }}
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <!-- RESULT -->
    <sc-if value="{{ done }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;animation:riseIn .5s ease both;padding-top:6px;">
        <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:30px;letter-spacing:2px;color:{{ resultColor }};text-shadow:0 0 30px {{ resultColor }};">{{ resultText }}</div>
        <div style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;color:#7b7d82;margin:18px 0 8px;">FINAL RANK</div>
        <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:52px;color:#e8792e;line-height:1;text-shadow:0 0 40px rgba(232,121,46,0.5);">{{ rank }}</div>
        <div style="font-size:15px;color:#9b9da2;margin-top:14px;">{{ score }} / 10 landed · {{ rankLine }}</div>
        <div style="margin-top:12px;font-family:'Space Mono',monospace;font-size:12px;color:#56c8d6;">{{ bestLine }}</div>
        <button onClick="{{ onRestart }}" style="margin-top:24px;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;letter-spacing:1px;color:#070608;background:#e8792e;border:none;padding:14px 32px;border-radius:12px;cursor:pointer;box-shadow:0 0 28px rgba(232,121,46,0.4);">Run it back →</button>
      </div>
    </sc-if>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:720}}">
class Component extends DCLogic {
  Q = [
    { q:"What is the name of the Nine-Tails sealed inside Naruto?", a:["Kurama","Shukaku","Gyuki","Matatabi"], c:0 },
    { q:"Who is Naruto's father?", a:["Jiraiya","Minato Namikaze","Hiruzen","Kakashi"], c:1 },
    { q:"What is Sasuke's clan?", a:["Hyuga","Senju","Uchiha","Nara"], c:2 },
    { q:"Kakashi's signature jutsu is the…", a:["Rasengan","Chidori","Shadow Clone","Amaterasu"], c:1 },
    { q:"Which village is Gaara the Kage of?", a:["Konoha","Kiri","Suna","Iwa"], c:2 },
    { q:"What does Rock Lee specialize in?", a:["Genjutsu","Taijutsu","Medical ninjutsu","Sealing"], c:1 },
    { q:"Itachi's clan-wiping technique on the mind is…", a:["Tsukuyomi","Susanoo","Kamui","Edo Tensei"], c:0 },
    { q:"Who becomes the Seventh Hokage?", a:["Sasuke","Kakashi","Naruto","Konohamaru"], c:2 },
    { q:"Jiraiya is one of the legendary…", a:["Akatsuki","Sannin","Anbu","Bijuu"], c:1 },
    { q:"Pain's real name is…", a:["Obito","Nagato","Yahiko","Madara"], c:1 },
  ];
  JUTSU = ["RASENGAN!","CHIDORI!","SHADOW CLONE!","RASENSHURIKEN!","8 TRIGRAMS!"];
  QTIME = 7000;

  state = { i:0, score:0, picked:null, done:false, best:this.read(), frame:0 };

  youHP=100; foeHP=100; streak=0;
  youPose="idle"; foePose="idle"; youPoseUntil=0; foePoseUntil=0;
  orb=null; booms=[]; parts=[]; floaters=[]; uid=1; announce=null;
  qStart=0; matchResult=null; isNew=false;
  _timers=[];

  read(){ try { return localStorage.getItem("him_narutoiq_best") || "—"; } catch(e){ return "—"; } }
  after(ms,fn){ const id=setTimeout(fn,ms); this._timers.push(id); return id; }
  now(){return Date.now();}

  componentDidMount(){
    this._loop=setInterval(()=>this.tick(),50);
    this.startDust();
    this.qStart=this.now();
  }
  componentWillUnmount(){ clearInterval(this._loop); cancelAnimationFrame(this._d); removeEventListener("resize",this._onR); this._timers.forEach(clearTimeout); }

  setAnnounce(t,c,sz){ this.announce={text:t,color:c,size:sz||"30px",key:this.uid++}; this.after(1100,()=>{ if(this.announce&&this.announce.text===t) this.announce=null; }); }
  shake(){ const r=this._root; if(!r)return; r.style.animation="none"; void r.offsetWidth; r.style.animation="shake .32s"; }
  setPose(who,p,ms){ if(who==="you"){this.youPose=p;this.youPoseUntil=this.now()+(ms||300);} else {this.foePose=p;this.foePoseUntil=this.now()+(ms||300);} }
  addBoom(x,y,c,s){ this.booms.push({id:this.uid++,x,y,color:c,size:s,born:this.now()}); }
  addSparks(x,y,c,n){ for(let i=0;i<(n||8);i++){ const a=Math.random()*6.28,d=12+Math.random()*28; this.parts.push({id:this.uid++,x,y,tx:Math.cos(a)*d,ty:Math.sin(a)*d,color:c,born:this.now()}); } }
  addFloater(x,y,t,c){ this.floaters.push({id:this.uid++,x,y,text:t,color:c,born:this.now()}); }

  mult(){ return 1+Math.min(4,Math.floor(this.streak/2)); }

  pick(idx){
    if(this.state.picked!==null||this.state.done) return;
    const cur=this.Q[this.state.i];
    const correct = idx===cur.c;
    const elapsed=this.now()-this.qStart;
    const fast = elapsed < this.QTIME*0.45;
    this.setState({ picked: idx });
    if(correct){
      this.streak++;
      const m=this.mult();
      const dmg = (fast?16:11)*m;
      // launch orb you->foe
      this.fireOrb("you", ()=>{
        this.foeHP=Math.max(0,this.foeHP-dmg);
        this.setPose("foe","hit",360); this.addBoom(80,52,"#e8b94e",46);
        this.addSparks(80,50,"#ffb56b",10); this.addFloater(80,38,"-"+dmg,"#ffd9b0"); this.shake();
        const jutsu=this.JUTSU[Math.min(this.JUTSU.length-1,Math.floor(this.streak/2))];
        this.setAnnounce(fast?jutsu:"HIT!", fast?"#e8b94e":"#5fbf8e", fast?"30px":"26px");
        this.advance();
      });
      this.setPose("you","attack",300);
    } else {
      this.streak=0;
      const dmg=14;
      this.fireOrb("foe", ()=>{
        this.youHP=Math.max(0,this.youHP-dmg);
        this.setPose("you","hit",360); this.addBoom(20,52,"#d44a6a",42);
        this.addSparks(20,50,"#d44a6a",10); this.addFloater(20,38,"-"+dmg,"#f5b8c6"); this.shake();
        this.setAnnounce("COUNTERED!","#d44a6a","26px");
        this.advance();
      });
      this.setPose("foe","attack",300);
    }
    this.setState(s=>({frame:s.frame+1}));
  }

  timeout(){
    if(this.state.picked!==null||this.state.done) return;
    this.streak=0;
    this.setState({ picked:-1 });
    this.fireOrb("foe", ()=>{
      this.youHP=Math.max(0,this.youHP-18);
      this.setPose("you","hit",360); this.addBoom(20,52,"#d44a6a",46); this.addSparks(20,50,"#d44a6a",10);
      this.addFloater(20,38,"-18","#f5b8c6"); this.shake();
      this.setAnnounce("TOO SLOW!","#d44a6a","28px");
      this.advance();
    });
    this.setPose("foe","attack",300);
    this.setState(s=>({frame:s.frame+1}));
  }

  fireOrb(from,onHit){
    const startX=from==="you"?28:72, endX=from==="you"?74:26;
    const color=from==="you"?"#e8a04a":"#8b7ef0";
    this.orb={x:startX,y:48,color,t:this.now()};
    // animate via transition by setting target next frame
    this.after(30,()=>{ if(this.orb){ this.orb.x=endX; this.setState(s=>({frame:s.frame+1})); }});
    this.after(430,()=>{ this.orb=null; onHit&&onHit(); this.setState(s=>({frame:s.frame+1})); });
    this.setState(s=>({frame:s.frame+1}));
  }

  advance(){
    if(this.foeHP<=0){ this.after(380,()=>this.finish(true)); return; }
    if(this.youHP<=0){ this.after(380,()=>this.finish(false)); return; }
    this.after(650,()=>{
      const ni=this.state.i+1;
      if(ni>=this.Q.length){ this.finish(this.youHP>=this.foeHP); }
      else { this.qStart=this.now(); this.setState({i:ni,picked:null}); }
    });
  }

  rankFor(s){
    if(s>=10) return ["HOKAGE","Believe it. Nobody knows it deeper."];
    if(s>=8) return ["JONIN","Elite. A few gaps, but dangerous."];
    if(s>=6) return ["CHUNIN","Solid shinobi. Keep training."];
    if(s>=3) return ["GENIN","Academy-grad energy."];
    return ["ACADEMY","...did you even watch it?"];
  }

  finish(won){
    const score=this.state.score; // updated below
    const [rank]=this.rankFor(this.scoreCount());
    let best=this.state.best, isNew=false;
    const order=["ACADEMY","GENIN","CHUNIN","JONIN","HOKAGE"];
    if(best==="—"||order.indexOf(rank)>order.indexOf(best)){ best=rank; isNew=true; try{localStorage.setItem("him_narutoiq_best",best);}catch(e){} }
    this.matchResult={won}; this.isNew=isNew;
    this.setState({done:true,best});
  }
  scoreCount(){ return this._score||0; }

  tick(){
    const t=this.now();
    if(this.youPose!=="idle"&&t>this.youPoseUntil) this.youPose="idle";
    if(this.foePose!=="idle"&&t>this.foePoseUntil) this.foePose="idle";
    this.booms=this.booms.filter(b=>t-b.born<600);
    this.parts=this.parts.filter(p=>t-p.born<520);
    this.floaters=this.floaters.filter(f=>t-f.born<800);
    if(!this.state.done && this.state.picked===null && this.qStart){
      if(t-this.qStart>this.QTIME) this.timeout();
    }
    this.setState(s=>({frame:s.frame+1}));
  }

  restart(){
    this._timers.forEach(clearTimeout); this._timers=[];
    this.youHP=100; this.foeHP=100; this.streak=0; this._score=0;
    this.booms=[]; this.parts=[]; this.floaters=[]; this.orb=null; this.announce=null; this.matchResult=null; this.isNew=false;
    this.qStart=this.now();
    this.setState({i:0,score:0,picked:null,done:false,frame:this.state.frame+1});
  }

  startDust(){
    const cv=this._dust; if(!cv)return;
    const ctx=cv.getContext("2d"); const dpr=window.devicePixelRatio||1;
    const resize=()=>{ cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
    resize(); this._onR=resize; addEventListener("resize",resize);
    const cols=["#e8a06a","#7ad4df","#ffffff"]; const P=[];
    for(let i=0;i<30;i++) P.push({x:Math.random(),y:Math.random(),r:0.6+Math.random()*1.4,sp:0.015+Math.random()*0.04,a:0.06+Math.random()*0.26,ph:Math.random()*6,c:cols[(Math.random()*cols.length)|0]});
    const draw=()=>{
      const w=cv.clientWidth,h=cv.clientHeight; ctx.clearRect(0,0,w,h);
      for(const p of P){ p.y-=p.sp/100; if(p.y<-0.05){p.y=1.05;p.x=Math.random();} p.ph+=0.01;
        const x=p.x*w+Math.sin(p.ph)*7, y=p.y*h;
        ctx.globalAlpha=p.a*(0.5+0.5*Math.sin(p.ph)); ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(x,y,p.r,0,7); ctx.fill(); }
      ctx.globalAlpha=1; this._d=requestAnimationFrame(draw);
    };
    this._d=requestAnimationFrame(draw);
  }

  poseT(pose,side){
    const dir=side==="you"?1:-1;
    if(pose==="attack") return `translateX(${20*dir}px) scale(1.06)`;
    if(pose==="hit") return `translateX(${-16*dir}px) rotate(${-7*dir}deg)`;
    return "translateY(0)";
  }

  renderVals(){
    // track score count for ranks
    const correctSoFar = this._score||0;
    const cur=this.Q[this.state.i];
    const picked=this.state.picked;
    const opts=cur.a.map((text,idx)=>{
      let bg="rgba(255,255,255,0.03)",bd="rgba(255,255,255,0.1)",col="#e7e6e3";
      if(picked!==null){
        if(idx===cur.c){ bg="rgba(95,191,142,0.16)";bd="#5fbf8e";col="#bff0d6"; }
        else if(idx===picked){ bg="rgba(212,74,106,0.16)";bd="#d44a6a";col="#f5c2cf"; }
      }
      return { key:String.fromCharCode(65+idx), text, locked:picked!==null, onPick:()=>this.choose(idx),
        style:`text-align:left;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:15px;color:${col};background:${bg};border:1px solid ${bd};padding:13px 15px;border-radius:12px;cursor:${picked!==null?'default':'pointer'};transition:all .18s ease;` };
    });
    const [rank,rankLine]=this.rankFor(correctSoFar);
    const youBob=this.youPose==="idle"?"animation:idleBob 2.4s ease-in-out infinite;":"";
    const foeBob=this.foePose==="idle"?"animation:idleBob 2.6s ease-in-out infinite;":"";
    const youWrap=`position:absolute;left:20%;bottom:6px;transform:translateX(-50%) ${this.poseT(this.youPose,"you")};transition:transform .15s ease;z-index:6;${youBob}`;
    const foeWrap=`position:absolute;left:80%;bottom:6px;transform:translateX(-50%) ${this.poseT(this.foePose,"foe")};transition:transform .15s ease;z-index:6;${foeBob}`;
    const orb=this.orb;
    const orbStyle=orb?`position:absolute;left:${orb.x}%;top:${orb.y}%;width:28px;height:28px;border-radius:50%;z-index:8;background:radial-gradient(circle at 40% 35%,#fff,${orb.color});box-shadow:0 0 22px ${orb.color},0 0 40px ${orb.color}88;transform:translate(-50%,-50%);transition:left .4s cubic-bezier(.4,.1,.7,1);pointer-events:none;`:"";
    const booms=this.booms.map(b=>({id:b.id,style:`position:absolute;left:${b.x}%;top:${b.y}%;width:${b.size}px;height:${b.size}px;z-index:9;border-radius:50%;border:3px solid ${b.color};box-shadow:0 0 22px ${b.color};animation:boomRing .55s ease-out forwards;pointer-events:none;`}));
    const parts=this.parts.map(p=>({id:p.id,style:`position:absolute;left:${p.x}%;top:${p.y}%;width:5px;height:5px;z-index:10;border-radius:50%;background:${p.color};box-shadow:0 0 6px ${p.color};--tx:${p.tx}px;--ty:${p.ty}px;animation:spark .5s ease-out forwards;pointer-events:none;`}));
    const floaters=this.floaters.map(f=>({id:f.id,text:f.text,style:`position:absolute;left:${f.x}%;top:${f.y}%;z-index:12;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:17px;color:${f.color};text-shadow:0 1px 4px rgba(0,0,0,0.8);pointer-events:none;animation:floatUp .8s ease-out forwards;`}));
    const an=this.announce;
    const elapsed=this.qStart?this.now()-this.qStart:0;
    const tleft=Math.max(0,1-elapsed/this.QTIME);
    const tcol=tleft>0.5?"#5fbf8e":tleft>0.25?"#e8b94e":"#d44a6a";
    const m=this.mult();
    const mr=this.matchResult;

    return {
      rootRef:(el)=>{this._root=el;}, dustRef:(el)=>{this._dust=el;},
      best:this.state.best,
      playing:!this.state.done, done:this.state.done,
      qNum:this.state.i+1, qKey:this.state.i, score:correctSoFar,
      youHpPct:this.youHP+"%", foeHpPct:this.foeHP+"%",
      youHpColor:this.youHP>40?"linear-gradient(90deg,#e8792e,#ffb56b)":"linear-gradient(90deg,#d44a6a,#f5808f)",
      foeHpColor:this.foeHP>40?"linear-gradient(90deg,#8b7ef0,#b9aef7)":"linear-gradient(90deg,#d44a6a,#f5808f)",
      streak:this.streak, mult:m, streakColor:this.streak>=4?"#e8b94e":this.streak>=2?"#5fbf8e":"#7b7d82",
      youWrap, foeWrap, showOrb:!!orb, orbStyle, booms, parts, floaters,
      showAnnounce:!!an, announceText:an?an.text:"", announceColor:an?an.color:"#fff", announceSize:an?an.size:"30px", announceKey:an?an.key:0,
      question:cur.q, options:opts,
      timerPct:(this.state.picked===null?tleft*100:tleft*100)+"%", timerColor:tcol,
      rank, rankLine,
      resultText: mr?(mr.won?"VICTORY":"DEFEATED"):"",
      resultColor: mr?(mr.won?"#5fbf8e":"#d44a6a"):"#fff",
      bestLine: this.isNew?"★ NEW BEST RANK":"best so far · "+this.state.best,
      onRestart:()=>this.restart(),
    };
  }

  choose(idx){
    // wrap pick to also update score counter for rank
    const cur=this.Q[this.state.i];
    if(this.state.picked===null && idx===cur.c){ this._score=(this._score||0)+1; this.setState(s=>({score:(s.score||0)+1})); }
    this.pick(idx);
  }
}
</script>
