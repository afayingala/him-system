<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0b0d;}
    @keyframes auroraDrift{0%{transform:translate(-5%,-3%) scale(1.1)}50%{transform:translate(5%,4%) scale(1.25)}100%{transform:translate(-5%,-3%) scale(1.1)}}@keyframes sweepDown{0%{transform:translateY(-120%)}100%{transform:translateY(2200px)}}
    @keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,2px)}}
    @keyframes boomRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
    @keyframes spark{to{transform:translate(var(--tx),var(--ty)) scale(.3);opacity:0}}
    @keyframes clashPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.25)}}
    @keyframes barGrow{from{width:0}}
    @keyframes vsThrob{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  </style>
</helmet>
<div ref="{{ rootRef }}" style="min-height:100vh;background:radial-gradient(900px 600px at 15% -10%, rgba(56,189,205,0.10), transparent 60%),radial-gradient(900px 600px at 85% -10%, rgba(232,121,46,0.10), transparent 60%),#0a0b0d;color:#e7e6e3;font-family:'Space Grotesk',sans-serif;padding:22px 26px 36px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:-15%;z-index:0;filter:blur(80px);opacity:0.5;background:radial-gradient(34% 34% at 78% 6%, #56c8d680, transparent 70%),radial-gradient(30% 30% at 10% 92%, #e8792e44, transparent 70%);animation:auroraDrift 30s ease-in-out infinite;"></div><canvas ref="{{ dustRef }}" style="position:absolute;inset:0;z-index:1;width:100%;height:100%;pointer-events:none;"></canvas><div style="position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0.5;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:46px 46px;"></div><div style="position:absolute;left:0;right:0;top:0;height:150px;z-index:1;pointer-events:none;background:linear-gradient(180deg,#56c8d612,transparent);animation:sweepDown 9s linear infinite;"></div><div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(130% 100% at 50% 40%, transparent 55%, rgba(10,11,13,0.72) 100%);"></div><div style="position:fixed;top:16px;left:16px;width:18px;height:18px;border-left:2px solid #56c8d666;border-top:2px solid #56c8d666;z-index:4;pointer-events:none;"></div><div style="position:fixed;top:16px;right:16px;width:18px;height:18px;border-right:2px solid #56c8d666;border-top:2px solid #56c8d666;z-index:4;pointer-events:none;"></div><div style="position:fixed;bottom:16px;left:16px;width:18px;height:18px;border-left:2px solid #56c8d666;border-bottom:2px solid #56c8d666;z-index:4;pointer-events:none;"></div><div style="position:fixed;bottom:16px;right:16px;width:18px;height:18px;border-right:2px solid #56c8d666;border-bottom:2px solid #56c8d666;z-index:4;pointer-events:none;"></div>

  <header style="position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.07);max-width:820px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="games.html" style="text-decoration:none;color:#9b9da2;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;border:1px solid rgba(255,255,255,0.12);padding:8px 12px;border-radius:9px;">← ARCADE</a>
      <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;">WHO WINS?</div>
    </div>
    <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:#56c8d6;">CALLS · {{ calls }}</div>
  </header>

  <main style="position:relative;z-index:5;max-width:820px;margin:0 auto;padding-top:16px;text-align:center;">
    <div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:#7b7d82;margin-bottom:4px;">MATCHUP #{{ matchNum }} · {{ category }}</div>
    <div style="font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:17px;margin-bottom:16px;color:#9b9da2;">{{ prompt }}</div>

    <div key="{{ matchKey }}" style="display:grid;grid-template-columns:1fr 78px 1fr;gap:14px;align-items:stretch;animation:riseIn .35s ease both;">
      <!-- A -->
      <button onClick="{{ pickA }}" disabled="{{ locked }}" style="{{ aStyle }}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div style="{{ a.avatar }}">{{ a.initials }}</div>
          <div style="text-align:left;flex:1;min-width:0;">
            <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:#7b7d82;">{{ a.from }}</div>
            <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:21px;line-height:1.05;">{{ a.name }}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <sc-for list="{{ a.stats }}" as="s" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1px;color:#7b7d82;width:34px;text-align:left;">{{ s.label }}</span>
              <div style="flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="{{ s.bar }}"></div></div>
              <span style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:10px;color:{{ s.col }};width:18px;text-align:right;">{{ s.val }}</span>
            </div>
          </sc-for>
        </div>
        <sc-if value="{{ revealed }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:13px;font-size:12px;line-height:1.5;color:#cfd0d2;border-top:1px solid rgba(255,255,255,0.1);padding-top:11px;text-align:left;">{{ a.case }}</div>
        </sc-if>
      </button>

      <!-- CLASH COLUMN -->
      <div style="position:relative;display:flex;align-items:center;justify-content:center;">
        <sc-if value="{{ revealed }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;z-index:7;background:radial-gradient(circle,#fff,#e8b94e);box-shadow:0 0 30px #e8b94e;animation:clashPulse .7s ease-in-out;"></div>
        </sc-if>
        <sc-for list="{{ clashParts }}" as="p" hint-placeholder-count="0"><div style="{{ p.style }}"></div></sc-for>
        <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:24px;color:#e8792e;z-index:8;animation:vsThrob 2.4s ease-in-out infinite;">VS</div>
      </div>

      <!-- B -->
      <button onClick="{{ pickB }}" disabled="{{ locked }}" style="{{ bStyle }}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div style="{{ b.avatar }}">{{ b.initials }}</div>
          <div style="text-align:left;flex:1;min-width:0;">
            <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:#7b7d82;">{{ b.from }}</div>
            <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:21px;line-height:1.05;">{{ b.name }}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <sc-for list="{{ b.stats }}" as="s" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1px;color:#7b7d82;width:34px;text-align:left;">{{ s.label }}</span>
              <div style="flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="{{ s.bar }}"></div></div>
              <span style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:10px;color:{{ s.col }};width:18px;text-align:right;">{{ s.val }}</span>
            </div>
          </sc-for>
        </div>
        <sc-if value="{{ revealed }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top:13px;font-size:12px;line-height:1.5;color:#cfd0d2;border-top:1px solid rgba(255,255,255,0.1);padding-top:11px;text-align:left;">{{ b.case }}</div>
        </sc-if>
      </button>
    </div>

    <!-- COMMUNITY SPLIT -->
    <div style="min-height:128px;margin-top:20px;">
      <sc-if value="{{ revealed }}" hint-placeholder-val="{{ false }}">
        <div style="animation:riseIn .4s ease both;max-width:560px;margin:0 auto;">
          <div style="display:flex;justify-content:space-between;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;margin-bottom:6px;">
            <span style="color:{{ aSplitCol }};">{{ aPct }}%</span>
            <span style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:#7b7d82;align-self:center;">THE INTERNET'S SPLIT</span>
            <span style="color:{{ bSplitCol }};">{{ bPct }}%</span>
          </div>
          <div style="position:relative;height:22px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);display:flex;">
            <div style="{{ aSplitBar }}"></div>
            <div style="{{ bSplitBar }}"></div>
            <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.3);"></div>
          </div>
          <div style="margin-top:14px;font-size:13px;color:#9b9da2;line-height:1.5;">You called <span style="color:#5fbf8e;font-weight:600;">{{ yourPick }}</span>. {{ verdictLine }}</div>
          <button onClick="{{ onNext }}" style="margin-top:16px;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;letter-spacing:1px;color:#070608;background:#56c8d6;border:none;padding:13px 30px;border-radius:12px;cursor:pointer;box-shadow:0 0 26px rgba(56,189,205,0.4);">Next matchup →</button>
          <sc-if value="{{ atBest }}" hint-placeholder-val="{{ false }}">
            <div style="margin-top:12px;font-family:'Space Mono',monospace;font-size:11px;color:#e8b94e;">★ {{ calls }} calls — your record for one sitting</div>
          </sc-if>
        </div>
      </sc-if>
      <sc-if value="{{ notRevealed }}" hint-placeholder-val="{{ true }}">
        <div style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;color:#7b7d82;padding-top:30px;">tap a fighter to make your call</div>
      </sc-if>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:680}}">
class Component extends DCLogic {
  // stats: POW SPD TEC DUR (0-100); split = % to A
  M = [
    { cat:"ANIME", a:{name:"Naruto Uzumaki",from:"NARUTO",st:[92,88,78,95],case:"Six Paths Sage Mode, Kurama chakra, endless stamina — outlasts almost anyone."}, b:{name:"Sasuke Uchiha",from:"NARUTO",st:[90,86,95,82],case:"Rinnegan + Amaterasu + teleport. One opening is all he needs."}, split:50 },
    { cat:"ANIME", a:{name:"Goku",from:"DRAGON BALL",st:[99,97,80,92],case:"Ultra Instinct dodges on instinct, scales to universal levels."}, b:{name:"Saitama",from:"ONE PUNCH MAN",st:[100,90,40,100],case:"It's one punch. The joke is that it's always one punch."}, split:38 },
    { cat:"FIGHTING", a:{name:"Scorpion",from:"MORTAL KOMBAT",st:[88,84,82,80],case:"GET OVER HERE — spear closes any gap, hellfire control."}, b:{name:"Sub-Zero",from:"MORTAL KOMBAT",st:[85,80,88,84],case:"Freeze on contact ends the fight before the spear lands."}, split:58 },
    { cat:"FOOTBALL", a:{name:"Messi",from:"FOOTBALL",st:[82,86,99,72],case:"Lower centre of gravity, impossible close control, clutch gene."}, b:{name:"Ronaldo",from:"FOOTBALL",st:[90,88,84,86],case:"Athletic freak, aerial threat, scores in any league on the planet."}, split:52 },
    { cat:"ANIME", a:{name:"Itachi",from:"NARUTO",st:[84,82,99,74],case:"Genjutsu mastery — you lose in his eyes before the fight starts."}, b:{name:"Madara",from:"NARUTO",st:[96,88,92,94],case:"Perfect Susanoo, Six Paths, took on the whole alliance solo."}, split:34 },
    { cat:"GAMES", a:{name:"Kratos",from:"GOD OF WAR",st:[97,80,82,96],case:"Killed entire pantheons. Rage incarnate with the Blades."}, b:{name:"Doomslayer",from:"DOOM",st:[95,90,84,93],case:"Tears through hell itself and never stops moving."}, split:46 },
    { cat:"ANIME", a:{name:"Gojo",from:"JUJUTSU KAISEN",st:[94,92,98,88],case:"Infinity + Limitless. You literally cannot touch him."}, b:{name:"Aizen",from:"BLEACH",st:[86,84,99,82],case:"Total hypnosis — you never know what's real once you see his blade."}, split:64 },
    { cat:"FOOTBALL", a:{name:"Mbappé",from:"FOOTBALL",st:[80,99,82,74],case:"Raw pace nobody on earth can track in a footrace to goal."}, b:{name:"Haaland",from:"FOOTBALL",st:[92,84,76,88],case:"A cheat code in the box — give him one chance and it's in."}, split:48 },
  ];
  state = { order:this.shuffle(), idx:0, picked:null, calls:0, best:this.read(), frame:0 };
  clashParts=[]; uid=1; _timers=[];

  read(){ try { return parseInt(localStorage.getItem("him_whowins_best"))||0; } catch(e){ return 0; } }
  shuffle(){ return [...Array(this.M.length).keys()].sort(()=>Math.random()-0.5); }
  after(ms,fn){ const id=setTimeout(fn,ms); this._timers.push(id); return id; }
  now(){return Date.now();}

  componentDidMount(){ this.startDust(); this._loop=setInterval(()=>this.tickParts(),60); }
  componentWillUnmount(){ clearInterval(this._loop); cancelAnimationFrame(this._d); removeEventListener("resize",this._onR); this._timers.forEach(clearTimeout); }

  shake(){ const r=this._root; if(!r)return; r.style.animation="none"; void r.offsetWidth; r.style.animation="shake .3s"; }
  tickParts(){ const t=this.now(); const before=this.clashParts.length; this.clashParts=this.clashParts.filter(p=>t-p.born<600); if(this.clashParts.length!==before) this.setState(s=>({frame:s.frame+1})); }

  pick(side){
    if(this.state.picked!==null)return;
    const calls=this.state.calls+1;
    let best=this.state.best;
    if(calls>best){ best=calls; try{localStorage.setItem("him_whowins_best",String(best));}catch(e){} }
    // clash burst
    const cols=["#e8b94e","#56c8d6","#e8792e","#fff"];
    for(let i=0;i<16;i++){ const a=Math.random()*6.28,d=14+Math.random()*40; this.clashParts.push({id:this.uid++,tx:Math.cos(a)*d,ty:Math.sin(a)*d,color:cols[(Math.random()*4)|0],born:this.now()}); }
    this.shake();
    this.setState({ picked:side, calls, best });
  }

  next(){
    let ni=this.state.idx+1, order=this.state.order;
    if(ni>=order.length){ order=this.shuffle(); ni=0; }
    this.clashParts=[];
    this.setState({ idx:ni, order, picked:null });
  }

  startDust(){
    const cv=this._dust; if(!cv)return;
    const ctx=cv.getContext("2d"); const dpr=window.devicePixelRatio||1;
    const resize=()=>{ cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
    resize(); this._onR=resize; addEventListener("resize",resize);
    const cols=["#e8a06a","#7ad4df","#ffffff"]; const P=[];
    for(let i=0;i<30;i++) P.push({x:Math.random(),y:Math.random(),r:0.6+Math.random()*1.4,sp:0.015+Math.random()*0.04,a:0.06+Math.random()*0.26,ph:Math.random()*6,c:cols[(Math.random()*cols.length)|0]});
    const draw=()=>{
      const w=cv.clientWidth,h=cv.clientHeight; ctx.clearRect(0,0,w,h);
      for(const p of P){ p.y-=p.sp/100; if(p.y<-0.05){p.y=1.05;p.x=Math.random();} p.ph+=0.01;
        const x=p.x*w+Math.sin(p.ph)*7, y=p.y*h;
        ctx.globalAlpha=p.a*(0.5+0.5*Math.sin(p.ph)); ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(x,y,p.r,0,7); ctx.fill(); }
      ctx.globalAlpha=1; this._d=requestAnimationFrame(draw);
    };
    this._d=requestAnimationFrame(draw);
  }

  initials(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
  statBars(st,accent,revealed){
    const labels=["POW","SPD","TEC","DUR"];
    return st.map((v,i)=>({
      label:labels[i], val:v,
      col: v>=90?"#e8b94e":v>=80?accent:"#9b9da2",
      bar:`height:100%;width:${revealed?v:Math.min(v,38)}%;background:linear-gradient(90deg,${accent},${accent}cc);border-radius:4px;transition:width .6s cubic-bezier(.3,.9,.4,1);box-shadow:0 0 8px ${accent}66;`,
    }));
  }

  renderVals(){
    const m=this.M[this.state.order[this.state.idx]];
    const picked=this.state.picked;
    const revealed=picked!==null;
    const accentA="#56c8d6", accentB="#e8792e";
    const mkCard=(f,accent,won,dimmed)=>{
      const base=`text-align:center;font-family:'Space Grotesk';color:#e7e6e3;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);padding:18px 16px;border-radius:18px;transition:all .25s ease;display:flex;flex-direction:column;`;
      let extra = picked===null?"cursor:pointer;":(won?`background:rgba(95,191,142,0.10);border-color:#5fbf8e;box-shadow:0 0 30px rgba(95,191,142,0.22);`:"opacity:0.5;");
      return base+extra;
    };
    const aData={ name:m.a.name, from:m.a.from, case:m.a.case, initials:this.initials(m.a.name),
      avatar:`width:46px;height:46px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:17px;color:#0a0b0d;background:radial-gradient(circle at 38% 30%,#fff,${accentA});box-shadow:0 0 16px ${accentA}66;`,
      stats:this.statBars(m.a.st,accentA,revealed) };
    const bData={ name:m.b.name, from:m.b.from, case:m.b.case, initials:this.initials(m.b.name),
      avatar:`width:46px;height:46px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:17px;color:#0a0b0d;background:radial-gradient(circle at 38% 30%,#fff,${accentB});box-shadow:0 0 16px ${accentB}66;`,
      stats:this.statBars(m.b.st,accentB,revealed) };

    const aPct=m.split, bPct=100-m.split;
    const clashParts=this.clashParts.map(p=>({id:p.id,style:`position:absolute;left:50%;top:50%;width:5px;height:5px;z-index:9;border-radius:50%;background:${p.color};box-shadow:0 0 7px ${p.color};--tx:${p.tx}px;--ty:${p.ty}px;transform:translate(-50%,-50%);animation:spark .55s ease-out forwards;pointer-events:none;`}));

    const yourPick = picked==="a"?m.a.name:picked==="b"?m.b.name:"";
    const youWithMajority = (picked==="a"&&aPct>=50)||(picked==="b"&&bPct>=50);
    const closeCall = Math.abs(aPct-50)<=4;
    const verdict = closeCall? "Basically a coin flip — bold of you to commit." : youWithMajority? "You're riding with the majority on this one." : "Hot take. You're going against the grain — respect.";

    return {
      rootRef:(el)=>{this._root=el;}, dustRef:(el)=>{this._dust=el;},
      calls:this.state.calls, matchNum:this.state.calls+(picked===null?1:0), matchKey:this.state.idx,
      category:m.cat,
      prompt:"Read the tale of the tape. Then make the call.",
      a:aData, b:bData,
      aStyle:mkCard(m.a,accentA,picked==="a"), bStyle:mkCard(m.b,accentB,picked==="b"),
      locked:revealed, revealed, notRevealed:!revealed,
      pickA:()=>this.pick("a"), pickB:()=>this.pick("b"), onNext:()=>this.next(),
      clashParts,
      aPct, bPct, aSplitCol:accentA, bSplitCol:accentB,
      aSplitBar:`width:${aPct}%;background:linear-gradient(90deg,${accentA},${accentA}aa);transition:width .8s cubic-bezier(.3,.9,.4,1);`,
      bSplitBar:`width:${bPct}%;background:linear-gradient(90deg,${accentB}aa,${accentB});transition:width .8s cubic-bezier(.3,.9,.4,1);`,
      yourPick, verdictLine:verdict,
      atBest: revealed && this.state.calls===this.state.best && this.state.calls>1,
    };
  }
}
</script>
</body>
</html>
